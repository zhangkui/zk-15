version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: waste-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: waste_management
      MYSQL_USER: waste
      MYSQL_PASSWORD: waste123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - waste-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: waste-backend
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: waste_management
      DB_USER: waste
      DB_PASSWORD: waste123
      UPLOAD_PATH: /app/uploads
      TZ: Asia/Shanghai
    ports:
      - "8080:8080"
    volumes:
      - uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - waste-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: waste-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - waste-network

volumes:
  mysql-data:
  uploads:

networks:
  waste-network:
    driver: bridge
